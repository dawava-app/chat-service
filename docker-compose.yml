services:
  chat-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: chat
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: ${MONGODB_URI:-mongodb://chat-mongo:27017/chat-service}
      REDIS_URL: ${REDIS_URL:-redis://chat-redis:6379}
      PORT: ${PORT:-3000}
      WS_PORT: ${WS_PORT:-3001}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL:-http://file:8080}
      FILE_SERVICE_TOKEN: ${INTERNAL_API_SECRET}
    ports:
      - "3000:${PORT:-3000}"  # REST API (internal, master calls this)
      - "3001:${WS_PORT:-3001}"  # WebSocket (public, frontend connects directly)
    depends_on:
      - chat-mongo
      - chat-redis
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:${PORT:-3000}/health',res=>process.exit(res.statusCode===200?0:1))\""]
      interval: 30s
      timeout: 10s
      retries: 5

  chat-mongo:
    image: mongo:7
    profiles: [with-db]
    container_name: chat_mongo
    restart: unless-stopped
    volumes:
      - chat-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-redis:
    image: redis:7-alpine
    profiles: [with-db]
    container_name: chat_redis
    restart: unless-stopped
    volumes:
      - chat-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  chat-mongo-data:
  chat-redis-data:
